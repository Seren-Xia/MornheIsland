# 放到 /www/sites/mornheisland.heycrab.xyz/proxy/mi.conf
# 注意：必须放在 root 声明之后（include 在末尾，满足这个条件）

# ============================================================
# ClassIsland CI 公开端点 — 直接到后端 7000
# ============================================================
location /v1/ci/ {
    proxy_pass http://127.0.0.1:7000;
}

# ============================================================
# 前端 SPA fallback（覆盖 root 的默认行为）
# ============================================================
location / {
    try_files $uri $uri/ /index.html;
}

# 静态资源缓存
location /_nuxt/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
}
